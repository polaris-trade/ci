name: pr-title

# Reusable Conventional Commits PR title linter. Matches the commitlint config
# documented in workspace AGENTS.md: type(scope): subject, lowercase, ≤100 chars.

on:
  workflow_call:
    inputs:
      types:
        # v6 of amannn/action-semantic-pull-request splits enum inputs on
        # newlines only. Passing commas is treated as a single opaque type.
        description: "Newline-separated allowed types (YAML multiline). Default matches AGENTS.md."
        required: false
        default: |
          build
          chore
          ci
          docs
          feat
          fix
          perf
          refactor
          revert
          style
          test
        type: string
      subject-case:
        description: "Subject case: lower-case, sentence-case, start-case, upper-case."
        required: false
        default: "lower-case"
        type: string
      header-max-length:
        description: "Max header length."
        required: false
        default: "100"
        type: string
      runner:
        description: "runs-on value. Bare string (ubuntu-latest) or JSON array of labels for self-hosted."
        required: false
        default: "ubuntu-latest"
        type: string

jobs:
  lint:
    name: conventional PR title
    runs-on: ${{ startsWith(inputs.runner, '[') && fromJSON(inputs.runner) || inputs.runner }}
    permissions:
      pull-requests: read
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: ${{ inputs.types }}
          # release-please PRs default to the scopeless title "chore: release main",
          # and release-please re-parses that exact title on the MERGED PR to decide
          # what to tag. Retitling to satisfy requireScope breaks tagging (proto #8,
          # #10), so skip linting its PRs entirely instead.
          ignoreLabels: "autorelease: pending"
          # Every PR title must carry a scope: `type(scope): subject`.
          # v6 accepts boolean-as-string only. See workspace AGENTS.md
          # "Commit Message Convention".
          requireScope: true
          scopes: ""
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The subject "{subject}" must start with lowercase. See workspace AGENTS.md
            "Commit Message Convention".
          headerPattern: '^(\w+)(?:\(([^)]+)\))?: (.+)$'
          headerPatternCorrespondence: type, scope, subject
          validateSingleCommit: false
          validateSingleCommitMatchesPrTitle: false
