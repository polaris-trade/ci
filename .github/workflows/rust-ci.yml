name: rust-ci

# Reusable Rust CI: fmt, clippy, cargo-nextest across a 3-OS × 3-toolchain matrix.
# MSRV is read from the caller's rust-toolchain.toml — single source of truth
# per module. Stable and nightly are always exercised. Central bumps to this
# workflow ship on next @ref resolution.

on:
  workflow_call:
    inputs:
      workspace-args:
        description: "Extra args appended to cargo commands (e.g. --features foo)."
        required: false
        default: ""
        type: string
      run-ignored:
        description: "Also run cargo nextest --run-ignored ignored-only (integration tests)."
        required: false
        default: false
        type: boolean
      os-matrix:
        description: "JSON array of runner labels. Default covers Linux, macOS, Windows."
        required: false
        default: '["ubuntu-latest", "macos-latest", "windows-latest"]'
        type: string
      extra-toolchains:
        description: "JSON array of extra toolchains added to {msrv, stable, nightly}."
        required: false
        default: '[]'
        type: string

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUST_BACKTRACE: 1

jobs:
  resolve-msrv:
    name: resolve MSRV from rust-toolchain.toml
    runs-on: ubuntu-latest
    outputs:
      msrv: ${{ steps.msrv.outputs.value }}
      toolchains: ${{ steps.toolchains.outputs.value }}
    steps:
      - uses: actions/checkout@v7

      - name: extract MSRV
        id: msrv
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -f rust-toolchain.toml ]]; then
            echo "::error::rust-toolchain.toml missing at repo root; required for MSRV resolution."
            exit 1
          fi
          # accept either channel = "1.96.0" or channel = "1.96"
          MSRV=$(grep -E '^\s*channel\s*=' rust-toolchain.toml | head -n1 | sed -E 's/.*"([^"]+)".*/\1/')
          if [[ -z "$MSRV" ]]; then
            echo "::error::could not parse channel from rust-toolchain.toml"
            exit 1
          fi
          echo "MSRV=$MSRV"
          echo "value=$MSRV" >> "$GITHUB_OUTPUT"

      - name: build toolchain matrix
        id: toolchains
        shell: bash
        env:
          MSRV: ${{ steps.msrv.outputs.value }}
          EXTRA: ${{ inputs.extra-toolchains }}
        run: |
          set -euo pipefail
          BASE=$(printf '["%s","stable","nightly"]' "$MSRV")
          COMBINED=$(jq -c --argjson base "$BASE" --argjson extra "$EXTRA" -n '$base + $extra | unique')
          echo "toolchains=$COMBINED"
          echo "value=$COMBINED" >> "$GITHUB_OUTPUT"

  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  test:
    name: test (${{ matrix.os }} / ${{ matrix.toolchain }})
    needs: resolve-msrv
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON(inputs.os-matrix) }}
        toolchain: ${{ fromJSON(needs.resolve-msrv.outputs.toolchains) }}
    steps:
      - uses: actions/checkout@v7

      - name: install toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}-${{ matrix.toolchain }}

      - name: install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: clippy
        run: cargo clippy --workspace --all-targets ${{ inputs.workspace-args }} -- -D warnings

      - name: nextest run
        run: cargo nextest run --workspace --no-fail-fast ${{ inputs.workspace-args }}

      - name: nextest run --ignored
        if: ${{ inputs.run-ignored }}
        run: cargo nextest run --workspace --no-fail-fast --run-ignored ignored-only ${{ inputs.workspace-args }}

      - name: doctests
        run: cargo test --workspace --doc ${{ inputs.workspace-args }}
