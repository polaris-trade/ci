name: release

# Reusable release workflow driving release-plz.
#
# Single source of truth: Cargo.toml version + Conventional Commits since last tag.
# Behaviour:
#   1. `release-plz release-pr` opens or updates a "chore: release" PR that bumps
#      the workspace/crate version(s) and regenerates CHANGELOG.md.
#   2. When that PR is merged into main, `release-plz release` creates the git tag,
#      publishes a GitHub Release with the changelog section, and (optionally)
#      publishes to crates.io.
#
# The caller decides whether to publish to crates.io via `with.publish`.

on:
  workflow_call:
    inputs:
      publish:
        description: "Publish to crates.io when the release PR is merged."
        required: false
        default: false
        type: boolean
      config-path:
        description: "Path to release-plz.toml. Empty = defaults."
        required: false
        default: ""
        type: string
    secrets:
      release-plz-token:
        description: "PAT (contents: write + pull-requests: write). Required."
        required: true
      cargo-registry-token:
        description: "crates.io token. Required only if publish=true."
        required: false

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

# Two jobs, mutually exclusive on head commit prefix.
#   - release-pr : any commit on main that isn't a release-plz merge.
#     Opens/updates the "chore(release): vX.Y.Z" PR. No tags, no releases.
#   - release   : the release-plz PR just merged. Tags + GitHub Release +
#     optional crates.io publish. Never runs on feature merges.
# pr_name in release-plz.toml must start with "chore(release)" for the guard.

jobs:
  preflight:
    name: preflight
    runs-on: ubuntu-latest
    steps:
      - name: verify release-plz-token present
        env:
          TOKEN: ${{ secrets.release-plz-token }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::error::release-plz-token secret is empty. Set RELEASE_PLZ_TOKEN in the caller repo."
            exit 1
          fi

  release-pr:
    name: release-pr
    needs: preflight
    if: ${{ !startsWith(github.event.head_commit.message, 'chore(release)') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.release-plz-token }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: release-plz release-pr
        uses: release-plz/action@v0.5
        with:
          command: release-pr
          config: ${{ inputs.config-path }}
        env:
          GITHUB_TOKEN: ${{ secrets.release-plz-token }}

  release:
    name: release
    needs: preflight
    if: ${{ startsWith(github.event.head_commit.message, 'chore(release)') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.release-plz-token }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: release-plz release
        uses: release-plz/action@v0.5
        with:
          command: release
          config: ${{ inputs.config-path }}
        env:
          GITHUB_TOKEN: ${{ secrets.release-plz-token }}
          CARGO_REGISTRY_TOKEN: ${{ inputs.publish && secrets.cargo-registry-token || '' }}
