# Local git hooks for the shared workflows repo (workflows/YAML only, no Rust).
# Install once per clone: `lefthook install`.
# Bypass a single commit with LEFTHOOK=0. Never bypass in shared work.

pre-commit:
  parallel: true
  commands:
    branch-name:
      run: |
        branch=$(git rev-parse --abbrev-ref HEAD)
        case "$branch" in
          main|master) echo "commit directly to '$branch' blocked. Open feature branch."; exit 1 ;;
        esac
        echo "$branch" | grep -qE '^(feat|fix|chore|docs|refactor|test|ci|perf|build|style|revert)/[a-z0-9._/-]+$' \
          || { echo "branch '$branch' does not match '<type>/<slug>'."; exit 1; }

    actionlint:
      # GitHub Actions workflow linter. Install: `brew install actionlint` or
      # `go install github.com/rhysd/actionlint/cmd/actionlint@latest`.
      # Skipped automatically if binary is missing.
      glob: ".github/workflows/*.{yml,yaml}"
      run: |
        if command -v actionlint >/dev/null 2>&1; then
          actionlint {staged_files}
        else
          echo "actionlint not installed. Skipping." >&2
        fi

commit-msg:
  commands:
    convco:
      run: convco check --from-stdin < {1}

pre-push:
  commands:
    no-push-protected:
      # Blocks push while HEAD is on main/master. Uses branch check instead of
      # git's pre-push stdin protocol because lefthook does not forward stdin
      # to commands by default and `while read` would hang.
      run: |
        branch=$(git symbolic-ref --short HEAD 2>/dev/null || echo detached)
        case "$branch" in
          main|master)
            echo "direct push from '$branch' blocked. Switch to a feature branch first."
            exit 1
            ;;
        esac
